name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          CLIENT_TOKEN: ${{ secrets.CLIENT_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          MODEL: ${{ secrets.FREE_MODEL }}
          OUTPUT: git-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
        run: bash scripts/build.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: git-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
