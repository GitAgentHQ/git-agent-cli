hook:
    - conventional
scopes:
    - name: app
      description: Orchestrates application services, impact aggregation, and commit planning in application/; excludes CLI routing and domain models.
    - name: cli
      description: Handles command-line interfaces, flag parsing, and user-facing output in cmd/; excludes backend service logic.
    - name: domain
      description: Defines core business models, validation rules, and interfaces in domain/; excludes infrastructure implementations.
    - name: e2e
      description: Runs full-stack integration tests validating CLI workflows and application behavior in e2e/; excludes unit tests.
    - name: hooks
      description: Manages git pre-commit shell scripts and execution templates in hooks/; excludes Go-based hook executors.
    - name: infra
      description: Adapters for Git, OpenAI, SQLite graph storage, and config resolution in infrastructure/; excludes domain models.
    - name: pkg
      description: Shared internal utilities, error definitions, and pattern filters in pkg/; excludes application services.
    - name: skills
      description: Agent skill definitions, markdown guides, and reference documentation in skills/; excludes executable runtime logic.
